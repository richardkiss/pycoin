name: Format check

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check formatting
        # To reformat locally: uvx ruff@0.15.8 format .
        run: uvx ruff@0.15.8 format --check .
